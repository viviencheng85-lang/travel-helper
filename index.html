<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅の記憶 - 莫蘭迪風格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #F2F0ED;
            --bg-card: #FFFFFF;
            --text-main: #5E5E5E;
            --text-sub: #9E9E9E;
            --accent: #A67B7B;
            --accent-soft: #D9C5C5;
            --border-color: rgba(230, 224, 217, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.9);
            --input-bg: #FCFCFC;
        }
        .dark-mode {
            --bg-body: #2C2C2C;
            --bg-card: #383838;
            --text-main: #E0E0E0;
            --text-sub: #A0A0A0;
            --accent: #C5A1A1;
            --accent-soft: #4A3E3E;
            --border-color: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(56, 56, 56, 0.95);
            --input-bg: #454545;
        }
        body {
            font-family: 'Zen Kaku Gothic New', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .muji-card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            position: relative;
            z-index: 2;
            transition: background-color 0.3s ease, transform 0.2s ease-out;
        }
        .muji-accent { color: var(--accent); }
        .muji-bg-accent { background-color: var(--accent); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input, textarea, select {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        input::placeholder { color: var(--text-sub); opacity: 0.6; }
        .nav-btn.active { color: var(--accent); }
        .swipe-container { position: relative; overflow: hidden; border-radius: 12px; margin-bottom: 1rem; }
        .delete-btn-bg {
            position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
            background-color: #C1666B; color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; border-radius: 0 12px 12px 0;
        }
        .item-content { position: relative; z-index: 2; background: var(--bg-card); transition: transform 0.3s ease; }
        .sortable-ghost { opacity: 0.3; background: var(--accent-soft) !important; }
        .action-link {
            display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px;
            border-radius: 9999px; border: 1px solid var(--border-color);
            font-size: 10px; color: var(--text-sub); background-color: var(--bg-body);
        }
        .segment-btn.active { background-color: var(--accent); color: white; }
        ::-webkit-scrollbar { display: none; }
        .info-section-title {
            font-size: 11px; font-weight: bold; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--accent);
            margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;
        }
        .info-list-item { display: flex; gap: 8px; font-size: 13px; margin-bottom: 10px; line-height: 1.6; }
        .info-list-dot { flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; background-color: var(--accent); margin-top: 8px; }
        .info-highlight { font-weight: bold; color: var(--accent); }

        /* 儲存狀態提示 */
        #save-toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white;
            padding: 8px 20px; border-radius: 20px; font-size: 11px;
            opacity: 0; transition: opacity 0.3s ease; z-index: 999; pointer-events: none;
        }
        #save-toast.show { opacity: 1; }
    </style>
</head>
<body class="pb-24">

    <!-- 儲存提示 Toast -->
    <div id="save-toast">✓ 已自動儲存</div>

    <!-- Header -->
    <header class="sticky top-0 z-50 border-b border-gray-200/10 p-4" style="background-color: var(--nav-bg); backdrop-filter: blur(20px);">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold tracking-widest muji-accent">旅遊小幫手 <span class="text-xs font-light opacity-50">| MORANDI</span></h1>
            <div class="flex items-center gap-3">
                <!-- 備份按鈕 -->
                <button onclick="showBackupMenu()" class="text-sm muji-accent p-1" title="備份/還原資料">
                    <i class="fas fa-cloud-arrow-up"></i>
                </button>
                <button onclick="toggleDarkMode()" class="text-lg muji-accent p-1">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
                <div class="text-[10px] opacity-60 flex items-center">
                    <i class="fas fa-circle mr-1 text-[6px] text-green-400"></i> 儲存中
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- PLAN 分頁 -->
        <section id="plan" class="tab-content active">
            <div class="muji-card p-5 mb-8 border-t-4" style="border-top-color: var(--accent);">
                <div class="flex justify-between items-start mb-4">
                    <input type="text" id="basic-title" class="text-xs font-bold opacity-40 uppercase tracking-widest border-none bg-transparent p-0 focus:ring-0 w-40" value="Flight & Stay" onchange="saveBasicInfo()">
                    <i class="fas fa-plane text-gray-200 opacity-30"></i>
                </div>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <input type="text" id="label-out" class="text-[10px] opacity-50 uppercase border-none bg-transparent p-0 focus:ring-0 w-full" value="Outbound" onchange="saveBasicInfo()">
                            <input type="text" id="flight-out" class="w-full text-xs font-bold border-none p-0 bg-transparent" placeholder="如: JL802 09:00" onchange="saveBasicInfo()">
                        </div>
                        <div class="space-y-1 border-l pl-4" style="border-left-color: var(--border-color);">
                            <input type="text" id="label-in" class="text-[10px] opacity-50 uppercase border-none bg-transparent p-0 focus:ring-0 w-full" value="Return" onchange="saveBasicInfo()">
                            <input type="text" id="flight-in" class="w-full text-xs font-bold border-none p-0 bg-transparent" placeholder="如: JL809 18:30" onchange="saveBasicInfo()">
                        </div>
                    </div>
                    <div class="pt-2 border-t" style="border-top-color: var(--border-color);">
                        <input type="text" id="label-hotel" class="text-[10px] opacity-50 uppercase border-none bg-transparent p-0 focus:ring-0 w-full" value="Accomodation" onchange="saveBasicInfo()">
                        <input type="text" id="hotel-info" class="w-full text-sm font-bold border-none p-0 bg-transparent" placeholder="飯店名稱與地址" onchange="saveBasicInfo()">
                    </div>
                </div>
            </div>
            <div id="itinerary-container" class="space-y-10"></div>
            <button onclick="addDay()" class="w-full py-4 border-2 border-dashed border-gray-300/30 text-gray-400 text-sm rounded-xl mt-8">
                ＋ 新增一日行程
            </button>
        </section>

        <!-- GUIDE 分頁 -->
        <section id="guide" class="tab-content">
            <h2 class="text-xl font-bold mb-6 text-center tracking-widest opacity-40 uppercase">Journal</h2>
            <div class="space-y-8">
                <article class="muji-card overflow-hidden">
                    <div class="h-48 bg-gray-200 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=800&q=80')"></div>
                    <div class="p-6">
                        <div class="text-[10px] muji-accent font-bold mb-2 tracking-widest uppercase">Spot 01 | Tokyo</div>
                        <h3 class="text-lg font-bold mb-3">淺草寺：江戶之魂</h3>
                        <div class="text-sm opacity-70 leading-relaxed font-light">
                            <p>在這片灰調城市中，淺草寺的朱紅顯得人格外平靜。建議在清晨前往，避開人潮，感受最純粹的江戶氣息。</p>
                        </div>
                    </div>
                </article>
            </div>
        </section>

        <!-- WALLET 分頁 -->
        <section id="wallet" class="tab-content">
            <div class="flex bg-gray-200/20 p-1 rounded-lg mb-6" style="background-color: var(--input-bg);">
                <button onclick="switchWalletSubTab('personal')" id="btn-wallet-personal" class="segment-btn active flex-1 py-1.5 text-xs font-bold rounded-md">個人支出</button>
